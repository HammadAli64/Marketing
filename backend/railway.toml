# Used when this service’s Root Directory is set to `backend` in Railway.
# https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn helix_backend.wsgi:application --bind 0.0.0.0:$PORT"
